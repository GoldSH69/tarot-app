<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>타로 - 관리자</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/themes/default.css" id="theme-link">
</head>
<body>
  <header id="app-header">
    <div class="header-inner">
      <h1 class="logo">🔮 타로 관리자</h1>
      <div class="header-actions">
        <a href="index.html" class="btn btn-secondary btn-sm">사용자 페이지</a>
        <button id="theme-toggle" onclick="cycleTheme()" title="테마 변경">🎨</button>
      </div>
    </div>
  </header>

  <main id="app-main">
    <!-- 로그인 -->
    <section id="admin-login" class="page active">
      <div class="admin-login-box">
        <h2>🔐 관리자 인증</h2>
        <div class="form-group">
          <input type="password" id="admin-password" placeholder="관리자 비밀번호" 
                 onkeypress="if(event.key==='Enter') adminLogin()">
        </div>
        <button class="btn btn-primary btn-lg" onclick="adminLogin()">로그인</button>
        <p id="admin-login-error" class="error-text hidden"></p>
      </div>
    </section>

    <!-- 관리자 대시보드 -->
    <section id="admin-dashboard" class="page hidden">
      <div class="admin-tabs">
        <button class="tab-btn active" data-admin-tab="analyze">🤖 AI 분석</button>
        <button class="tab-btn" data-admin-tab="journal-sync">📋 일지 동기화</button>
        <button class="tab-btn" data-admin-tab="request-manage">📮 의뢰 관리</button>
      </div>

      <!-- AI 분석 탭 -->
      <div id="admin-tab-analyze" class="admin-tab-content active">
        <h3>AI 타로 분석</h3>
        <div class="form-group">
          <label>질문</label>
          <textarea id="ai-question" rows="3" placeholder="질문 내용"></textarea>
        </div>
        <div class="form-group">
          <label>스프레드 유형</label>
          <select id="ai-spread-type">
            <option value="one-card">원카드</option>
            <option value="three-past-present-future">쓰리카드: 과거-현재-미래</option>
            <option value="three-situation-obstacle-advice">쓰리카드: 상황-장애물-조언</option>
            <option value="three-mind-action-result">쓰리카드: 마음-행동-결과</option>
            <option value="spirit-tarot">영타로</option>
          </select>
        </div>

        <!-- 카드 선택기 -->
        <div class="form-group">
          <label>카드 선택</label>
          <div id="ai-card-selector" class="ai-card-selector"></div>
          <div id="ai-selected-cards" class="ai-selected-cards"></div>
        </div>

        <div class="form-group">
          <label>추가 맥락 (선택)</label>
          <textarea id="ai-context" rows="2" placeholder="의뢰인 상황 등 추가 정보"></textarea>
        </div>

        <button class="btn btn-primary btn-lg" onclick="runAIAnalysis()">
          🤖 AI 분석 실행
        </button>

        <div id="ai-result" class="ai-result hidden">
          <h4>분석 결과</h4>
          <div id="ai-result-content"></div>
          <button class="btn btn-secondary" onclick="copyAIResult()">📋 복사</button>
        </div>
      </div>

      <!-- 일지 동기화 탭 -->
      <div id="admin-tab-journal-sync" class="admin-tab-content hidden">
        <h3>Gist 일지 동기화</h3>
        <div class="form-group">
          <label>Gist ID (최초 저장 시 비워두세요)</label>
          <input type="text" id="gist-id" placeholder="Gist ID">
        </div>
        <div class="sync-buttons">
          <button class="btn btn-primary" onclick="saveToGist()">☁️ Gist에 저장</button>
          <button class="btn btn-secondary" onclick="loadFromGist()">📥 Gist에서 불러오기</button>
        </div>
        <div id="sync-result" class="hidden"></div>
      </div>

      <!-- 의뢰 관리 탭 -->
      <div id="admin-tab-request-manage" class="admin-tab-content hidden">
        <h3>의뢰 관리</h3>
        <p>의뢰 메일을 확인하고 AI 분석 후 이메일로 회신하세요.</p>
        <div id="request-list" class="request-list">
          <p class="empty-message">로컬에 저장된 의뢰가 여기에 표시됩니다.</p>
        </div>
      </div>
    </section>
  </main>

  <footer id="app-footer">
    <p class="disclaimer">관리자 전용 페이지</p>
  </footer>

  <div id="toast-container"></div>

  <script src="js/cards.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/gemini.js"></script>
  <script src="js/gist.js"></script>
</body>
</html>
